name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install release dependencies
        run: |
          python -m pip install --disable-pip-version-check --upgrade pip
          python -m pip install --disable-pip-version-check -e ".[dev]"

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python -c 'import importlib.metadata, os; from packaging.version import Version; assert Version(os.environ["RELEASE_TAG"].removeprefix("v")) == Version(importlib.metadata.version("agent-deep-research-trigger"))'

      - name: Run release gate
        run: deep-research-release-gate

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --prerelease --verify-tag
